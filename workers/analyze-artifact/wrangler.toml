name = "analyze-artifact"
main = "index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = true

[ai]
binding = "AI"

[vars]
# Your custom backend URL (receives image URLs + metadata)
BACKEND_URL = "http://localhost:3000"
# Backend type: "custom" for your own API, "ollama" for Ollama direct
BACKEND_TYPE = "custom"
# Set to "true" to use Cloudflare AI as fallback
USE_CLOUDFLARE_FALLBACK = "false"