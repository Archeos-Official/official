name = "analyze-artifact"
main = "index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = true

[vars]
# Your custom backend URL (receives image URLs + metadata)
BACKEND_URL = "http://localhost:3000"
# Set to "true" to use Cloudflare AI as fallback (not recommended - HTTP only mode)
USE_CLOUDFLARE_FALLBACK = "false"